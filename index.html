<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>مدیریت وظایف و یادآوری</title>
<style>
:root{--bg:#f4f6fb;--card:#fff;--text:#172033;--muted:#7b8497;--line:#e5e9f2;--primary:#1f4fd8;--danger:#e63d3d;--ok:#20a464;--warn:#f2a900;--shadow:0 10px 30px rgba(14,25,58,.08);--radius:18px}
*{box-sizing:border-box}html,body{margin:0;max-width:100%;overflow-x:hidden;font-family:Tahoma,Arial,sans-serif;background:var(--bg);color:var(--text)}button,input,select,textarea{font-family:inherit}button{cursor:pointer;border:0}
.appbar{position:fixed;top:0;right:0;left:0;height:62px;background:rgba(255,255,255,.92);backdrop-filter:blur(14px);border-bottom:1px solid var(--line);z-index:50;display:flex;align-items:center;gap:10px;padding:10px 14px}.hamb{width:42px;height:42px;border-radius:14px;background:#eef3ff;color:var(--primary);font-size:24px}.title{font-weight:800;font-size:17px;white-space:nowrap}.searchWrap{flex:1;min-width:0}.searchWrap input{width:100%;height:42px;border:1px solid var(--line);border-radius:14px;padding:0 12px;background:#fafbff;outline:none}
.main{padding:78px 14px 90px;max-width:1000px;margin:auto}.drawerBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.32);z-index:80;display:none}.drawerBackdrop.show{display:block}.drawer{position:fixed;top:0;bottom:0;right:-295px;width:285px;max-width:84vw;background:#fff;z-index:90;box-shadow:-20px 0 50px rgba(0,0,0,.18);transition:.25s;padding:18px}.drawer.open{right:0}.drawer h3{margin:8px 0 18px}.navBtn{display:flex;width:100%;align-items:center;gap:10px;background:#f7f9ff;padding:13px;border-radius:15px;margin-bottom:10px;color:var(--text);font-weight:700}.navBtn.active{background:var(--primary);color:#fff}
.card,.task,.infoItem,.occasionItem{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;margin-bottom:12px}.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;margin-bottom:12px}.toolbar .left,.quickActions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.btn{height:40px;border-radius:13px;padding:0 14px;background:#eef3ff;color:var(--primary);font-weight:800}.btn.primary{background:var(--primary);color:#fff}.btn.danger{background:#fff0f0;color:var(--danger)}.btn.gray{background:#f0f2f6;color:#5b6477}.fab{position:fixed;left:18px;bottom:18px;width:58px;height:58px;border-radius:22px;background:var(--primary);color:#fff;font-size:30px;box-shadow:0 14px 30px rgba(31,79,216,.34);z-index:60}.sectionTitle{margin:0 0 10px;font-size:20px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.stat{background:#fff;border:1px solid var(--line);border-radius:16px;padding:12px;box-shadow:var(--shadow)}.stat b{display:block;font-size:22px}.stat span{font-size:12px;color:var(--muted)}
.task{display:grid;grid-template-columns:1fr;gap:10px}.task.done{opacity:.68;background:#f0f1f4}.taskDesc{font-weight:800;line-height:1.8;overflow-wrap:anywhere}.meta{display:flex;gap:4px;flex-wrap:nowrap;margin-top:8px;overflow:hidden;align-items:center}.meta .pill{white-space:nowrap;flex:1 1 0;min-width:0;text-align:center;overflow:hidden;text-overflow:ellipsis;padding:6px 5px;font-size:11px}.meta .pill.reminder{flex:1.9 1 0}.pill{font-size:12px;border-radius:999px;padding:6px 9px;background:#f1f4fa;color:#5f687b}.pill.ok{background:#eaf8f1;color:var(--ok)}.pill.warn{background:#fff5d8;color:#a46d00}.pill.danger{background:#ffecec;color:var(--danger)}
.actions{display:flex!important;gap:8px!important;align-items:center!important;justify-content:space-between!important;border-top:1px dashed var(--line);padding-top:8px;width:100%}.iconBtn{width:38px;height:38px;border-radius:13px;background:#f3f5f9;color:#172033;padding:0;flex-shrink:0}.monoIcon{width:18px;height:18px;display:block;margin:auto;fill:currentColor}.switch{position:relative;width:44px;height:24px;display:inline-block;flex-shrink:0}.switch input{display:none}.slider{position:absolute;inset:0;background:#ccd2df;border-radius:999px;transition:.2s}.slider:before{content:"";position:absolute;width:18px;height:18px;right:3px;top:3px;background:#fff;border-radius:50%;transition:.2s;box-shadow:0 2px 8px rgba(0,0,0,.2)}.switch input:checked + .slider{background:var(--ok)}.switch input:checked + .slider:before{right:23px}
.empty{text-align:center;color:var(--muted);padding:24px}.page{display:none}.page.active{display:block}.hideDesktop{display:none}.smallNote{color:var(--muted);font-size:12px;line-height:1.8}
.modalBackdrop{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:100;display:none;align-items:flex-end}.modalBackdrop.show{display:flex}.modal{width:100%;max-width:560px;margin:auto auto 0;background:#fff;border-radius:24px 24px 0 0;padding:16px;max-height:92vh;overflow:auto}.field{margin-bottom:12px}.field label{display:block;font-size:13px;font-weight:800;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;background:#fbfcff;outline:none}.field textarea{min-height:84px;resize:vertical}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.timeInput{direction:ltr;text-align:center}
.table,.reportTable{width:100%;border-collapse:separate;border-spacing:0 8px}.table th,.reportTable th{text-align:right;color:var(--muted);font-size:12px;padding:0 10px}.table td,.reportTable td{background:#fff;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:10px;vertical-align:top}.table td:first-child,.reportTable td:first-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}.table td:last-child,.reportTable td:last-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}.reportTable tr.done td{background:#f0f1f4;color:#727b8e}.reportBox{display:grid;gap:10px}
.cal{border:1px solid var(--line);border-radius:16px;padding:10px;background:#fff;margin-top:6px}.calHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}.calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;text-align:center}.calGrid div{padding:9px 0;border-radius:10px;font-size:12px}.day{background:#f5f7fb}.day.sel{background:var(--primary);color:#fff}.day.today{outline:2px solid var(--warn)}
.infoGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.infoItem h3,.occasionItem h3{margin:0 0 8px;font-size:16px}.infoItem p,.occasionItem p{margin:0;color:var(--muted);line-height:1.8;white-space:pre-wrap;overflow-wrap:anywhere}.reminderSoon{border-color:#ffd980!important;background:#fffaf0!important}.reminderDue{border-color:#ffb8b8!important;background:#fff6f6!important}.hiddenFileInput{display:none}
@media(max-width:720px){.appbar{height:60px;padding:9px}.title{font-size:14px}.searchWrap{max-width:58vw}.main{padding:74px 10px 86px}.grid{grid-template-columns:repeat(2,1fr)}.row,.infoGrid{grid-template-columns:1fr}.table,.table thead,.table tbody,.table tr,.table th,.table td,.reportTable,.reportTable thead,.reportTable tbody,.reportTable tr,.reportTable th,.reportTable td{display:block;width:100%}.table thead,.reportTable thead{display:none}.table tr,.reportTable tr{background:#fff;border:1px solid var(--line);border-radius:16px;padding:8px;margin-bottom:10px}.table td,.reportTable td{border:0!important;border-radius:0!important;padding:7px;white-space:normal!important;overflow-wrap:anywhere!important;line-height:1.8}.table td:before,.reportTable td:before{content:attr(data-label);display:block;color:var(--muted);font-size:11px;margin-bottom:3px}.hideMobile{display:none}.hideDesktop{display:inline-flex}.meta{gap:3px}.meta .pill{font-size:10.5px;padding:6px 4px}}

/* v26 settings buttons */
.settingsActions{
  display:flex;
  flex-direction:column;
  gap:10px;
}
.settingsRow{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}
.settingsActions .btn{
  width:100%;
  min-width:0;
  text-align:center;
  justify-content:center;
}
.notificationBtn{
  width:100%;
}
@media(max-width:420px){
  .settingsRow{grid-template-columns:1fr 1fr}
  .settingsActions .btn{font-size:14px;padding:0 8px}
}

</style>
</head>
<body>
<header class="appbar">
<button class="hamb" id="openDrawer">☰</button>
<div class="title" id="pageTitle">وظایف</div>
<div class="searchWrap"><input id="globalSearch" placeholder="جستجو..." /></div>
</header>
<div class="drawerBackdrop" id="drawerBackdrop"></div>
<aside class="drawer" id="drawer">
<h3>منو</h3>
<button class="navBtn active" data-page="tasksPage">📋 وظایف</button>
<button class="navBtn" data-page="reportsPage">📊 گزارشات</button>
<button class="navBtn" data-page="peoplePage">👤 افراد مسئول</button>
<button class="navBtn" data-page="occasionsPage">🎂 مناسبت‌ها</button>
<button class="navBtn" data-page="infoPage">📌 اطلاعات لازم</button>
<button class="navBtn" data-page="settingsPage">⚙️ تنظیمات</button>
</aside>
<main class="main">
<section id="tasksPage" class="page active">
<div class="grid" id="stats"></div>
<div class="toolbar"><h2 class="sectionTitle">وظایف</h2><div class="left"><button class="btn" onclick="printTasks()">🖨️ پرینت</button><button class="btn primary hideMobile" onclick="openTaskModal()">+ وظیفه جدید</button></div></div>
<div id="tasksList"></div>
</section>

<section id="reportsPage" class="page">
<div class="card"><h2 class="sectionTitle">گزارش</h2><div class="row">
<div class="field"><label>مسئول</label><select id="reportPerson"></select></div>
<div class="field"><label>وضعیت</label><select id="reportStatus"><option value="all">همه</option><option value="doing">در حال انجام</option><option value="done">انجام شده</option><option value="overdue">یادآوری گذشته</option></select></div>
</div><button class="btn primary" onclick="renderReports()">نمایش گزارش</button></div>
<div id="reportResult" class="reportBox"></div>
</section>

<section id="peoplePage" class="page">
<div class="toolbar"><h2 class="sectionTitle">افراد مسئول</h2><button class="btn primary" onclick="openPersonModal()">+ افزودن مسئول</button></div>
<table class="table"><thead><tr><th>نام</th><th>تعداد وظیفه</th><th>عملیات</th></tr></thead><tbody id="peopleTable"></tbody></table>
</section>

<section id="occasionsPage" class="page">
<div class="toolbar"><h2 class="sectionTitle">مناسبت‌ها</h2><button class="btn primary" onclick="openOccasionModal()">+ مناسبت جدید</button></div>
<div id="occasionsList"></div>
</section>

<section id="infoPage" class="page">
<div class="toolbar"><h2 class="sectionTitle">اطلاعات لازم</h2><button class="btn primary" onclick="openInfoModal()">+ اطلاعات جدید</button></div>
<div id="infoList" class="infoGrid"></div>
</section>

<section id="settingsPage" class="page">
<div class="card"><h2 class="sectionTitle">تنظیمات</h2><p class="smallNote">اطلاعات در همین مرورگر ذخیره می‌شود. برای اطمینان، مرتب خروجی پشتیبان بگیر.</p>
<div class="settingsActions" style="margin-top:12px">
<div class="settingsRow">
<button class="btn primary" onclick="exportBackup()">📤 خروجی پشتیبان</button>
<button class="btn" onclick="document.getElementById('backupFile').click()">📥 بازیابی پشتیبان</button>
</div>
<button class="btn notificationBtn" onclick="requestNotifications()">🔔 فعال‌سازی نوتیفیکیشن</button>
</div>
<input id="backupFile" class="hiddenFileInput" type="file" accept=".json,application/json" onchange="importBackup(event)">
</div>
<div class="card"><h2 class="sectionTitle">وضعیت نوتیفیکیشن</h2><p id="notificationStatus" class="smallNote"></p></div>
</section>
</main>
<button class="fab" onclick="openTaskModal()">+</button>

<div class="modalBackdrop" id="taskModal"><div class="modal">
<h3 id="taskModalTitle">وظیفه جدید</h3><input type="hidden" id="taskId">
<div class="field"><label>شرح</label><textarea id="taskDesc" placeholder="شرح وظیفه"></textarea></div>
<div class="field"><label>مسئول</label><select id="taskPerson"></select></div>
<div class="row"><div class="field"><label>تاریخ ثبت</label><input id="taskCreated" readonly></div><div class="field"><label>تاریخ یادآوری</label><input id="taskReminderDate" readonly placeholder="اختیاری" onclick="openCalendar('taskReminderDate')"></div></div>
<div class="field"><label>ساعت یادآوری</label><input id="taskReminderTime" class="timeInput" type="time"></div>
<div id="calendarBox" class="cal" style="display:none"></div>
<div class="toolbar"><button class="btn gray" onclick="closeTaskModal()">انصراف</button><div class="left"><button class="btn gray" onclick="clearTaskReminder()">حذف یادآوری</button><button class="btn primary" onclick="saveTask()">ذخیره</button></div></div>
</div></div>

<div class="modalBackdrop" id="personModal"><div class="modal">
<h3 id="personModalTitle">مسئول جدید</h3><input type="hidden" id="personOld">
<div class="field"><label>نام مسئول</label><input id="personName"></div>
<div class="toolbar"><button class="btn gray" onclick="closePersonModal()">انصراف</button><button class="btn primary" onclick="savePerson()">ذخیره</button></div>
</div></div>

<div class="modalBackdrop" id="occasionModal"><div class="modal">
<h3 id="occasionModalTitle">مناسبت جدید</h3><input type="hidden" id="occasionId">
<div class="field"><label>عنوان</label><input id="occasionTitle" placeholder="مثلاً تولد احمدی"></div>
<div class="row"><div class="field"><label>تاریخ</label><input id="occasionDate" readonly onclick="openCalendar('occasionDate')"></div><div class="field"><label>نوع</label><select id="occasionType"><option>تولد</option><option>سالگرد</option><option>تعطیلی</option><option>مناسبت شخصی</option><option>سایر</option></select></div></div>
<div class="field"><label>توضیح</label><textarea id="occasionNote" placeholder="توضیح اختیاری"></textarea></div>
<div class="toolbar"><button class="btn gray" onclick="closeOccasionModal()">انصراف</button><button class="btn primary" onclick="saveOccasion()">ذخیره</button></div>
</div></div>

<div class="modalBackdrop" id="infoModal"><div class="modal">
<h3 id="infoModalTitle">اطلاعات جدید</h3><input type="hidden" id="infoId">
<div class="field"><label>عنوان</label><input id="infoTitle" placeholder="مثلاً حساب بانک ملت"></div>
<div class="field"><label>دسته</label><select id="infoCategory"><option>شرکت</option><option>بانک</option><option>تأمین‌کننده</option><option>مشتری</option><option>شماره مهم</option><option>دستگاه</option><option>سایر</option></select></div>
<div class="field"><label>متن اطلاعات</label><textarea id="infoText" placeholder="اطلاعات لازم را اینجا بنویس"></textarea></div>
<div class="toolbar"><button class="btn gray" onclick="closeInfoModal()">انصراف</button><button class="btn primary" onclick="saveInfo()">ذخیره</button></div>
</div></div>

<script>
const LS='tak_dashboard_v25_complete';
let state=loadState(),activePage='tasksPage',search='',calTarget=null,calYear=null,calMonth=null,calSelected=null;
const editIcon='<svg class="monoIcon" viewBox="0 0 24 24"><path d="M4 17.25V20h2.75L17.8 8.95l-2.75-2.75L4 17.25zM19.7 7.05c.4-.4.4-1 0-1.4l-1.35-1.35c-.4-.4-1-.4-1.4 0l-1.05 1.05 2.75 2.75 1.05-1.05z"/></svg>';
const delIcon='<svg class="monoIcon" viewBox="0 0 24 24"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM8 9h8v10H8V9zm7.5-5l-1-1h-5l-1 1H5v2h14V4h-3.5z"/></svg>';
function id(){return 'i'+Date.now()+Math.random().toString(16).slice(2)}
function loadState(){try{let s=JSON.parse(localStorage.getItem(LS));if(s&&s.tasks&&s.people)return normalize(s)}catch(e){}try{let old=JSON.parse(localStorage.getItem('tak_task_manager_v9'));if(old&&old.tasks&&old.people)return normalize(old)}catch(e){}return normalize({people:['رضایی','احمدی','محمدی'],tasks:[{id:id(),desc:'نمونه: پیگیری سفارش پاکت',person:'رضایی',created:todayJalali(),reminderDate:'',reminderTime:'',done:false},{id:id(),desc:'نمونه: کنترل طراحی چاپ',person:'احمدی',created:todayJalali(),reminderDate:addJDays(2),reminderTime:'09:00',done:false}],occasions:[],infoItems:[],settings:{notifications:true}})}
function normalize(s){s.people=s.people||[];s.tasks=s.tasks||[];s.occasions=s.occasions||[];s.infoItems=s.infoItems||[];s.settings=s.settings||{notifications:true};s.tasks.forEach(t=>{t.id=t.id||id();t.created=t.created||todayJalali();t.reminderDate=t.reminderDate||t.due||'';t.reminderTime=t.reminderTime||t.time||'';t.done=!!t.done;t.notified=!!t.notified;t.updated=t.updated||Date.now()});s.occasions.forEach(o=>{o.id=o.id||id();o.date=o.date||todayJalali();o.notified=!!o.notified});s.infoItems.forEach(i=>{i.id=i.id||id()});return s}
function save(){localStorage.setItem(LS,JSON.stringify(state))}
function fa(n){return String(n??'').replace(/\d/g,d=>'۰۱۲۳۴۵۶۷۸۹'[d])}
function en(s){return String(s||'').replace(/[۰-۹]/g,d=>'۰۱۲۳۴۵۶۷۸۹'.indexOf(d)).replace(/[٠-٩]/g,d=>'٠١٢٣٤٥٦٧٨٩'.indexOf(d))}
function pad(n){return String(n).padStart(2,'0')}
function todayJalali(){return g2jStr(new Date())}
function addJDays(days){let d=new Date();d.setDate(d.getDate()+days);return g2jStr(d)}
function g2jStr(date){const j=toJalali(date.getFullYear(),date.getMonth()+1,date.getDate());return `${j.jy}/${pad(j.jm)}/${pad(j.jd)}`}
function jStrToDate(s){if(!s)return null;let [jy,jm,jd]=en(s).split('/').map(Number);if(!jy||!jm||!jd)return null;let g=toGregorian(jy,jm,jd);return new Date(g.gy,g.gm-1,g.gd)}
function diffDays(j){const d=jStrToDate(j);if(!d)return null;const t=new Date();t.setHours(0,0,0,0);d.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
function reminderInfo(t){if(t.done)return{text:'انجام شده',cls:'ok'};if(!t.reminderDate)return{text:'بدون یادآوری',cls:''};const d=diffDays(t.reminderDate);if(d<0)return{text:fa(Math.abs(d))+' روز گذشته',cls:'danger'};if(d===0)return{text:t.reminderTime?'امروز '+fa(t.reminderTime):'امروز',cls:'warn'};if(d<=3)return{text:fa(d)+' روز مانده',cls:'warn'};return{text:fa(d)+' روز مانده',cls:'ok'}}
function sortTasks(arr){return[...arr].sort((a,b)=>Number(a.done)-Number(b.done)||(jStrToDate(a.reminderDate)||new Date(8640000000000000))-(jStrToDate(b.reminderDate)||new Date(8640000000000000))||(a.reminderTime||'99:99').localeCompare(b.reminderTime||'99:99')||b.updated-a.updated)}
function filteredTasks(){let q=search.trim().toLowerCase();let arr=state.tasks;if(q)arr=arr.filter(t=>[t.desc,t.person,t.created,t.reminderDate,t.reminderTime,t.done?'انجام شده':'در حال انجام'].join(' ').toLowerCase().includes(q));return sortTasks(arr)}
function render(){save();renderStats();renderTasks();renderPeople();renderOccasions();renderInfoItems();fillSelects();updateNotificationStatus();if(activePage==='reportsPage')renderReports(false)}
function renderStats(){const total=state.tasks.length,done=state.tasks.filter(t=>t.done).length,doing=total-done,over=state.tasks.filter(t=>!t.done&&t.reminderDate&&diffDays(t.reminderDate)<0).length;document.getElementById('stats').innerHTML=[['کل',total],['در حال انجام',doing],['انجام شده',done],['یادآوری گذشته',over]].map(x=>`<div class="stat"><b>${fa(x[1])}</b><span>${x[0]}</span></div>`).join('')}
function renderTasks(){const box=document.getElementById('tasksList'),arr=filteredTasks();if(!arr.length){box.innerHTML='<div class="card empty">موردی پیدا نشد</div>';return}box.innerHTML=arr.map(t=>{const inf=reminderInfo(t);return `<div class="task ${t.done?'done':''}"><div><div class="taskDesc">${esc(t.desc)}</div><div class="meta"><span class="pill">👤 ${esc(t.person)}</span><span class="pill">ثبت: ${fa(t.created)}</span>${t.reminderDate?`<span class="pill reminder ${inf.cls}">یادآوری: ${fa(t.reminderDate)} ${t.reminderTime?fa(t.reminderTime):''} - ${inf.text}</span>`:''}</div></div><div class="actions"><label class="switch" title="روشن: در حال انجام / خاموش: انجام شده"><input type="checkbox" ${!t.done?'checked':''} onchange="toggleDone('${t.id}',this.checked)"><span class="slider"></span></label><button class="iconBtn" title="ویرایش" onclick="editTask('${t.id}')">${editIcon}</button><button class="iconBtn" title="حذف" onclick="deleteTask('${t.id}')">${delIcon}</button></div></div>`}).join('')}
function fillSelects(){let opts=state.people.map(p=>`<option value="${escAttr(p)}">${esc(p)}</option>`).join('');document.getElementById('taskPerson').innerHTML=opts;document.getElementById('reportPerson').innerHTML='<option value="all">همه مسئول‌ها</option>'+opts}
function openTaskModal(t=null){document.getElementById('taskModal').classList.add('show');document.getElementById('calendarBox').style.display='none';document.getElementById('taskModalTitle').textContent=t?'ویرایش وظیفه':'وظیفه جدید';document.getElementById('taskId').value=t?.id||'';document.getElementById('taskDesc').value=t?.desc||'';fillSelects();document.getElementById('taskPerson').value=t?.person||state.people[0]||'';document.getElementById('taskCreated').value=t?.created||todayJalali();document.getElementById('taskReminderDate').value=t?.reminderDate||'';document.getElementById('taskReminderTime').value=t?.reminderTime||''}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('show')}

function toJalali(gy,gm,gd){const g_d_m=[0,31,59,90,120,151,181,212,243,273,304,334];let jy=(gy<=1600)?0:979;gy-=(gy<=1600)?621:1600;let gy2=(gm>2)?gy+1:gy;let days=365*gy+div(gy2+3,4)-div(gy2+99,100)+div(gy2+399,400)-80+gd+g_d_m[gm-1];jy+=33*div(days,12053);days%=12053;jy+=4*div(days,1461);days%=1461;if(days>365){jy+=div(days-1,365);days=(days-1)%365}let jm=(days<186)?1+div(days,31):7+div(days-186,30);let jd=1+((days<186)?days%31:(days-186)%30);return{jy,jm,jd}}
function toGregorian(jy,jm,jd){jy=Number(jy);jm=Number(jm);jd=Number(jd);let gy=(jy<=979)?621:1600;jy-=(jy<=979)?0:979;let days=365*jy+div(jy,33)*8+div((jy%33)+3,4)+78+jd+((jm<7)?(jm-1)*31:((jm-7)*30+186));gy+=400*div(days,146097);days%=146097;if(days>36524){gy+=100*div(--days,36524);days%=36524;if(days>=365)days++}gy+=4*div(days,1461);days%=1461;if(days>365){gy+=div(days-1,365);days=(days-1)%365}let gd=days+1;let sal_a=[0,31,((gy%4===0&&gy%100!==0)||gy%400===0)?29:28,31,30,31,30,31,31,30,31,30,31];let gm;for(gm=1;gm<=12&&gd>sal_a[gm];gm++)gd-=sal_a[gm];return{gy,gm,gd}}

function jalCal(jy){const breaks=[-61,9,38,199,426,686,756,818,1111,1181,1210,1635,2060,2097,2192,2262,2324,2394,2456,3178];let bl=breaks.length,gy=jy+621,leapJ=-14,jp=breaks[0],jm,jump,leap,leapG,march,n,i;if(jy<jp||jy>=breaks[bl-1])return{leap:1};for(i=1;i<bl;i++){jm=breaks[i];jump=jm-jp;if(jy<jm)break;leapJ+=div(jump,33)*8+div(jump%33,4);jp=jm}n=jy-jp;leapJ+=div(n,33)*8+div((n%33)+3,4);if(jump%33===4&&jump-n===4)leapJ++;leapG=div(gy,4)-div((div(gy,100)+1)*3,4)-150;march=20+leapJ-leapG;if(jump-n<6)n=n-jump+div(jump+4,33)*33;leap=((n+1)%33-1)%4;if(leap===-1)leap=4;return{leap,gy,march}}
